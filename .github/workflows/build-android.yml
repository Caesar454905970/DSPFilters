name: Build DSPFilters Android

on:
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DSPFilters
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Configure CMake for Android arm64-v8a Debug
        run: |
          cmake -S shared -B build/android/arm64-v8a/debug \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=26 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDSPFILTERS_BUILD_SHARED=ON \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/out/android/arm64-v8a"

      - name: Build Debug
        run: |
          cmake --build build/android/arm64-v8a/debug --config Debug --parallel

      - name: Install Debug
        run: |
          cmake --install build/android/arm64-v8a/debug --config Debug

      - name: Configure CMake for Android arm64-v8a Release
        run: |
          cmake -S shared -B build/android/arm64-v8a/release \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=26 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DDSPFILTERS_BUILD_SHARED=ON \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/out/android/arm64-v8a"

      - name: Build Release
        run: |
          cmake --build build/android/arm64-v8a/release --config Release --parallel

      - name: Install Release
        run: |
          cmake --install build/android/arm64-v8a/release --config Release

      - name: List output
        run: |
          find "$GITHUB_WORKSPACE/out/android/arm64-v8a" -maxdepth 4 -type f | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dspfilters-android-arm64-v8a
          path: out/android/arm64-v8a
